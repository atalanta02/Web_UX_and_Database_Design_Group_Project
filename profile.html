<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineTV - Profile</title>

  <!-- == SUPABASE == -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ================= JS IN HEAD ================= -->
  <script>
    const SUPABASE_URL = "https://jtqkbhgucspgklccgawd.supabase.co";
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0cWtiaGd1Y3NwZ2tsY2NnYXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwMjE4NTIsImV4cCI6MjA3NTU5Nzg1Mn0.fBiGoem1tfS2RInqdBv9EekdIdw5ydQIPUl_JewMJ_M';


    document.addEventListener("DOMContentLoaded", async () => {

  console.log("SCRIPT LOADED");

  if (!window.supabase) {
    console.error("Supabase not loaded");
    return;
  }

  const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  // ===== ELEMENTS =====
  const loginBtn = document.getElementById("loginBtn");
  const signupBtn = document.getElementById("signupBtn");

  const loginSection = document.getElementById("loginSection");
  const signupSection = document.getElementById("signupSection");
  const profileSection = document.getElementById("profileSection");

  const userEmail = document.getElementById("userEmail");

  // ===== SAFETY CHECK =====
  if (!loginBtn || !signupBtn || !loginSection || !signupSection) {
    console.error("Missing HTML elements");
    return;
  }

  // ===== TOGGLE FUNCTIONS =====
  function showLogin() {
    loginSection.style.display = "block";
    signupSection.style.display = "none";

    loginBtn.classList.add("active");
    signupBtn.classList.remove("active");
  }

  function showSignup() {
    loginSection.style.display = "none";
    signupSection.style.display = "block";

    signupBtn.classList.add("active");
    loginBtn.classList.remove("active");
  }

  loginBtn.addEventListener("click", showLogin);
  signupBtn.addEventListener("click", showSignup);

  // default state
  showLogin();

  // ===== CHECK USER =====
  async function checkUser() {
    const { data } = await supabase.auth.getUser();

    if (data.user) {
      profileSection.style.display = "block";
      loginSection.style.display = "none";
      signupSection.style.display = "none";

      userEmail.textContent = data.user.email;
    } else {
      profileSection.style.display = "none";
      showLogin();
    }
  }

  checkUser();

  // ===== GUARDS =====
  let isSigningUp = false;
  let isLoggingIn = false;

  // ===== SIGNUP =====
  document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    console.log("SIGNUP CLICK");

    if (isSigningUp) return;
    isSigningUp = true;

    const btn = e.target.querySelector("button");
    btn.disabled = true;

    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;

    const { error } = await supabase.auth.signUp({
      email,
      password
    });

    btn.disabled = false;
    isSigningUp = false;

    if (error) {
      console.error(error.message);
      return showMessage(error.message, "error");
    }

    showMessage("Signup successful! Now log in.", "success");
    showLogin();
  });

  // ===== LOGIN =====
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    console.log("LOGIN CLICK");

    if (isLoggingIn) return;
    isLoggingIn = true;

    const btn = e.target.querySelector("button");
    btn.disabled = true;

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    btn.disabled = false;
    isLoggingIn = false;

    if (error) {
      console.error(error.message);
      return showMessage(error.message, "error");
    }

    checkUser();
  });

  // ===== LOGOUT =====
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await supabase.auth.signOut();
    checkUser();
  });

});

// ===== ALERTS =====
function showMessage(msg, type) {
  document.getElementById("alerts").innerHTML =
    `<div class="${type}">${msg}</div>`;
}
  </script>
</head>

<body>

<header class="header">
  <div class="logo"><p>CineTV</p></div>

  <nav class="navbar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="movies.html">Movies</a></li>
      <li><a href="tv_shows.html">TV Shows</a></li>
      <li><a class="active" href="profile.html">Profile</a></li>
      <li><a href="about_us.html">About Us</a></li>
    </ul>
  </nav>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

  <!-- ================= MAIN ================= -->
<main>
  <div class="container profile-container">
    <h1 class="page-title">Profile</h1>

    <!-- == TOGGLE BUTTONS == -->
    <div class="form-toggle">
      <button id="loginBtn" class="active" type="button">Login</button>
      <button id="signupBtn" type="button">Sign Up</button>
    </div>

    <div id="alerts"></div>

    <!-- ================= SIGNUP ================= -->
    <section id="signupSection" class="profile-card" style="display:none;">
      <h2>Create Account</h2>

      <form id="signupForm">
        <input id="signupEmail" type="email" placeholder="Email" required />
        <input id="signupPassword" type="password" placeholder="Password" required />
        <button class="profile-button" type="submit">Sign Up</button>
      </form>
    </section>

    <!-- ================= LOGIN ================= -->
    <section id="loginSection" class="profile-card">
      <h2>Login</h2>

      <form id="loginForm">
        <input id="loginEmail" type="email" placeholder="Email" required />
        <input id="loginPassword" type="password" placeholder="Password" required />
        <button class="profile-button" type="submit">Login</button>
      </form>
    </section>

    <!-- ================= PROFILE ================= -->
    <section id="profileSection" class="profile-card" style="display:none;">
      <h2>Welcome</h2>
      <p id="userEmail"></p>

      <button id="logoutBtn" class="profile-button logout-button">
        Logout
      </button>
    </section>

  </div>
</main>


  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-container">

      <div class="footer-section social">
        <h4>Follow Us</h4>
        <a href="https://instagram.com" target="_blank">Instagram</a>
        <a href="https://facebook.com" target="_blank">Facebook</a>
      </div>

      <div class="footer-section contact">
        <h4>Contact</h4>
        <p>Email: <a href="mailto:ourcine@cinetv.ie">ourcine@cinetv.ie</a></p>
        <p>Phone: <a href="tel:+00680980">+00 680 980</a></p>
      </div>

    </div>

    <div class="footer-bottom">
      <p>&copy; 2026 CineTV</p>
      <p>Manage your movies, your way.</p>
    </div>
  </footer>

</body>
