<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineTV - Profile</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

  <script defer>
    const SUPABASE_URL = 'https://jtqkbhgucspgklccgawd.supabase.co';
    const SUPABASE_ANON_KEY =
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0cWtiaGd1Y3NwZ2tsY2NnYXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwMjE4NTIsImV4cCI6MjA3NTU5Nzg1Mn0.fBiGoem1tfS2RInqdBv9EekdIdw5ydQIPUl_JewMJ_M';

    let supabaseClient;

    window.addEventListener("DOMContentLoaded", async () => {
      supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
      );

      document
        .getElementById("login-form")
        .addEventListener("submit", handleLogin);

      document
        .getElementById("logout-button")
        .addEventListener("click", handleLogout);

      await checkUser();

      supabaseClient.auth.onAuthStateChange(() => {
        checkUser();
      });
    });

    async function checkUser() {
      const { data, error } = await supabaseClient.auth.getUser();

      const loginSection = document.getElementById("login-section");
      const profileSection = document.getElementById("profile-section");
      const userEmail = document.getElementById("user-email");

      if (error) {
        showMessage(error.message, "error");
        return;
      }

      if (data.user) {
        loginSection.style.display = "none";
        profileSection.style.display = "block";
        userEmail.textContent = data.user.email;
      } else {
        loginSection.style.display = "block";
        profileSection.style.display = "none";
      }
    }

    async function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password,
      });

      if (error) {
        showMessage(error.message, "error");
        return;
      }

      showMessage("Login successful!", "success");
    }

    async function handleLogout() {
      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        showMessage(error.message, "error");
        return;
      }

      showMessage("Logged out successfully", "success");
    }

    function showMessage(message, type) {
      const alerts = document.getElementById("alerts");
      alerts.innerHTML = `<div class="${type}">${message}</div>`;
    }
  </script>
</head>

  <body>
    <!-- header -->
    <!-- logo -->
    <header class="header">
      <div class="logo">
        <p>CineTV</p>
      </div>
      <!-- logo ends -->

      <!-- navbar -->
      <nav class="navbar">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="movies.html">Movies</a></li>
          <li><a class="tv_shows.html">TV Shows</a></li>
          <li><a href="search.html">Search</a></li>
          <li><a href="active" href="./profile.html">Profile</a></li>
          <li><a href="about_us.html">About Us</a></li>
        </ul>
      </nav>
      <!-- navbar ends -->

    <!-- header ends-->

  <!-- MAIN -->
  <main>
    <div class="container profile-container">
      <h1 class="page-title">Profile</h1>

      <div id="alerts"></div>

      <!-- LOGIN FORM -->
      <section id="login-section" class="profile-card">
        <h2>Log In to Your Account</h2>

        <form id="login-form">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <button type="submit" class="profile-button">
            Log In
          </button>
        </form>
      </section>

      <!-- LOGGED IN VIEW -->
      <section id="profile-section" class="profile-card" style="display: none;">
        <h2>Welcome Back</h2>

        <p>You are logged in as:</p>
        <p id="user-email" class="user-email"></p>

        <button id="logout-button" class="profile-button logout-button">
          Log Out
        </button>
      </section>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">

      <div class="footer-section contact">

        <p>
          Email:
          <a href="mailto:ourcine@cinetv.ie">ourcine@cinetv.ie</a>
        </p>
        <p>Phone: <a href="tel:+00680980">+00 680 980</a></p>
      </div>

    </div>

    <div class="footer-bottom">

    </div>
  </footer>

</body>
</html>
