<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="images\logo.png" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineTV</title>
    <link rel="stylesheet" href="styles.css" />
    
    <!-- Supabase JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
      defer
    ></script>
    <script src="scripts/search.js" defer></script>
  </head>
  <body>
    <!-- header -->
    <!-- logo -->
    <header class="header">
      <div class="logo">
        <p>CineTV</p>
      </div>
      <!-- logo ends -->

      <!-- navbar -->
      <nav class="navbar">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="movies.html">Movies</a></li>
          <li><a href="tv_shows.html">TV Shows</a></li>
          <li><a class="active" href="./profile.html">Search</a></li>
          <li><a href="profile.html">Profile</a></li>
          <li><a href="about_us.html">About Us</a></li>
        </ul>
      </nav>
      <!-- navbar ends -->
       <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </header>
    <!-- header ends-->

    <main>
    <h1 class="page-title">Search</h1>
     <div class="table-wrapper">
          <h3>Media list</h3>
          <button class="btn-filter" onclick="setType('all')">All</button>
          <button class="btn-filter" onclick="setType('movie')">Movies</button>
          <button class="btn-filter" onclick="setType('show')">Shows</button>
          <button class="btn-filter" onclick="setSort('az')">A–Z</button>
          <button class="btn-filter" onclick="setSort('za')">Z–A</button>
          <input type="text" id="searchInput" placeholder="Search..." oninput="applyFilters()">

          <table class="crud-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Title</th>
                <th>Type</th>
              </tr>
            </thead>
            <tbody id="movie-table-body"></tbody>
          </table>
          <p id="crud-message" class="crud-message"></p>
        </div>
      </div>
    </main>
    <!-- crud section end-->
    <!-- footer section -->
    <footer class="site-footer">
      <div class="footer-container">
        <div class="footer-section social">
          <h4>Follow Us</h4>
          <a href="https://instagram.com" target="_blank">
            <img
              src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"
              alt="Instagram"
            />
            Instagram
          </a>
          <a href="https://facebook.com" target="_blank">
            <img
              src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"
              alt="Facebook"
            />
            Facebook
          </a>
        </div>
        <div class="footer-section contact">
          <h4>Contact</h4>
          <p>
            Email:
            <a href="mailto:ourcine@cinetv.ie">ourcine@cinetv.ie</a>
          </p>
          <p>Phone: <a href="tel:+00680980">+00 680 980</a></p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 CineTV</p>
        <p>Manage your movies, your way.</p>
      </div>
    </footer>
    <!-- footer section end-->
  </body>
</html>
